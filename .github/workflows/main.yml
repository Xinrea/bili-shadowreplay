name: Release
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          - platform: "macos-latest" # for Apple silicon macs.
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
            target: ""
          - platform: "windows-latest"
            args: "--features cuda"
            features: "cuda"
            target: ""
          - platform: "windows-latest"
            args: ""
            features: "cpu"
            target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Set build type
        id: build_type
        run: |
          if [[ "${{ github.ref }}" == *"rc"* ]]; then
            echo "debug=true" >> $GITHUB_OUTPUT
          else
            echo "debug=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "yarn" # Set this to npm, yarn or pnpm.

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable # Set this to dtolnay/rust-toolchain@nightly
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install CUDA toolkit (Windows CUDA only)
        if: matrix.platform == 'windows-latest' && matrix.features == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.24

      - name: Setup ffmpeg
        if: matrix.platform == 'windows-latest'
        working-directory: ./
        shell: pwsh
        # running script ffmpeg_setup.ps1 to install ffmpeg on windows.
        # This script is located in the root of the repository.
        run: ./ffmpeg_setup.ps1

      - name: install frontend dependencies
        # If you don't have `beforeBuildCommand` configured you may want to build your frontend here too.
        run: yarn install # change this to npm or pnpm depending on which one you use.

      - name: Copy CUDA DLLs (Windows CUDA only)
        if: matrix.platform == 'windows-latest' && matrix.features == 'cuda'
        shell: pwsh
        run: |
          $cudaPath = "$env:CUDA_PATH\bin"
          $targetPath = "src-tauri"
          New-Item -ItemType Directory -Force -Path $targetPath
          Copy-Item "$cudaPath\cudart64*.dll" -Destination $targetPath
          Copy-Item "$cudaPath\cublas64*.dll" -Destination $targetPath
          Copy-Item "$cudaPath\cublasLt64*.dll" -Destination $targetPath

      - name: Get previous tag
        id: get_previous_tag
        run: |
          # Get the previous tag (excluding the current one being pushed)
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            # If no previous tag found, use the first commit
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD | head -1)
          fi
          echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
          echo "current_tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        shell: bash

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CMAKE_OSX_DEPLOYMENT_TARGET: "13.3"
          CMAKE_CUDA_ARCHITECTURES: "75"
          WHISPER_BACKEND: ${{ matrix.features }}
          # Sentry DSN baked into the binary at build time (option_env! in main.rs).
          # When unset, Sentry is disabled in the build instead of using a default.
          SENTRY_ENDPOINT: ${{ secrets.SENTRY_ENDPOINT }}
        with:
          tagName: v__VERSION__
          releaseName: "BiliBili ShadowReplay v__VERSION__"
          releaseBody: "> [!NOTE]\n> 如果你是第一次下载安装，请参考 [安装准备](https://bsr.xinrea.cn/getting-started/installation/desktop.html) 选择合适的版本。\n> Changelog: https://github.com/Xinrea/bili-shadowreplay/compare/${{ steps.get_previous_tag.outputs.previous_tag }}...${{ steps.get_previous_tag.outputs.current_tag }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} ${{ matrix.platform == 'windows-latest' && matrix.features == 'cuda' && '--config src-tauri/tauri.windows.cuda.conf.json' || '' }}

      - name: Generate dSYM for Sentry (macOS only)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          RUST_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          # Rust on macOS keeps DWARF in the object files; run dsymutil to
          # produce a .dSYM bundle next to the binary so Sentry can symbolicate.
          BIN="src-tauri/target/$RUST_TARGET/release/bili-shadowreplay"
          if [ -f "$BIN" ]; then
            echo "Running dsymutil on $BIN"
            dsymutil "$BIN"
          else
            echo "Binary not found, skipping dsymutil: $BIN"
          fi

      - name: Upload debug symbols to Sentry
        # Requires repository secrets: SENTRY_URL, SENTRY_AUTH_TOKEN, SENTRY_ORG, SENTRY_PROJECT
        shell: bash
        env:
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          RUST_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "SENTRY_AUTH_TOKEN not set, skipping debug symbol upload."
            exit 0
          fi
          # Use the explicit target triple from the matrix to locate the build output.
          if [ -n "$RUST_TARGET" ]; then
            DEBUG_DIR="src-tauri/target/$RUST_TARGET/release"
          else
            DEBUG_DIR="src-tauri/target/release"
          fi
          echo "Uploading debug files from: $DEBUG_DIR"
          npx --yes @sentry/cli@2 debug-files upload --include-sources "$DEBUG_DIR"
